<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>嘉義店客戶管理</title>
    <style>
        :root {
            --bg-color: #1a1a1d;
            --panel-bg: #2d2d30;
            --text-main: #f0f0f0;
            --text-muted: #9e9e9e;
            --accent: #d4af37; 
            --alert: #e53935;
            --success: #43a047;
            --border: #424242;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); padding: 20px; line-height: 1.6; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { text-align: center; color: var(--accent); margin-bottom: 24px; letter-spacing: 2px; }
        
        /* 導覽列 */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab-btn { flex: 1; padding: 12px; background: var(--panel-bg); color: var(--text-muted); border: 1px solid var(--border); border-radius: 8px; cursor: pointer; text-align: center; font-weight: bold; transition: 0.3s; min-width: 100px; }
        .tab-btn.active { background: var(--accent); color: #1a1a1d; border-color: var(--accent); }

        /* 面板區塊 */
        .panel { background: var(--panel-bg); border-radius: 12px; padding: 20px; border: 1px solid var(--border); display: none; }
        .panel.active { display: block; }
        h2 { font-size: 1.2rem; margin-bottom: 16px; color: var(--accent); border-bottom: 1px solid var(--border); padding-bottom: 8px; }

        /* 表單樣式 */
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .form-group { margin-bottom: 12px; }
        .form-group.full-width { grid-column: 1 / -1; }
        label { display: flex; justify-content: space-between; align-items: center; font-size: 0.9rem; margin-bottom: 6px; color: var(--text-muted); }
        input, select, textarea { width: 100%; padding: 10px; background: #1e1e1e; border: 1px solid var(--border); color: var(--text-main); border-radius: 6px; outline: none; }
        textarea { resize: vertical; line-height: 1.5; }
        input:focus, select:focus, textarea:focus { border-color: var(--accent); }
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }
        
        button.action-btn { width: 100%; padding: 12px; background: var(--accent); color: #1a1a1d; border: none; border-radius: 6px; font-weight: bold; font-size: 1.1rem; cursor: pointer; margin-top: 10px; transition: 0.2s; }
        button.action-btn:hover { opacity: 0.9; }

        /* 日期快速按鈕 */
        .btn-date { background: #333; color: var(--accent); border: 1px solid var(--border); padding: 4px 8px; border-radius: 4px; font-size: 0.75rem; cursor: pointer; transition: 0.2s; }
        .btn-date:hover { background: #444; border-color: var(--accent); }

        /* 客戶卡片 */
        .customer-card { background: #1e1e1e; border: 1px solid var(--border); border-radius: 8px; padding: 15px; margin-bottom: 15px; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .card-name { font-size: 1.2rem; font-weight: bold; color: var(--accent); }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; font-weight: bold; }
        .badge.alert { background: rgba(229, 57, 53, 0.2); color: var(--alert); border: 1px solid var(--alert); }
        .badge.ok { background: rgba(67, 160, 71, 0.2); color: var(--success); border: 1px solid var(--success); }
        .badge.none { background: rgba(158, 158, 158, 0.1); color: var(--text-muted); border: 1px solid var(--border); }
        
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 0.95rem; }
        .info-item span { color: var(--text-muted); font-size: 0.85rem; display: block; margin-bottom: 4px; }
        .info-item strong { color: var(--text-main); line-height: 1.5; display: block; }
        
        .fitting-box { background: rgba(212, 175, 55, 0.05); border: 1px dashed var(--accent); padding: 12px; border-radius: 6px; margin-top: 12px; font-size: 0.9rem; }
        
        .card-actions { margin-top: 15px; display: flex; gap: 10px; justify-content: flex-end; flex-wrap: wrap; }
        .btn-small { padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 0.85rem; font-weight: bold; transition: 0.2s; }
        .btn-update { background: var(--success); color: white; }
        .btn-edit { background: var(--accent); color: #1a1a1d; }
        .btn-delete { background: transparent; color: var(--alert); border: 1px solid var(--alert); }
        .btn-small:hover { opacity: 0.8; }

        /* 約騎/通知區塊 */
        .event-invite-box { background: #1e1e1e; padding: 15px; border-radius: 8px; text-align: center; margin-bottom: 15px; border: 1px solid var(--border); }
        .event-invite-box p { color: var(--text-muted); margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>嘉義店客戶管理</h1>

    <div class="tabs">
        <div class="tab-btn active" id="tabBtnList" onclick="switchTab('list')">車友總覽</div>
        <div class="tab-btn" id="tabBtnAdd" onclick="switchTab('add')">新增建檔</div>
        <div class="tab-btn" id="tabBtnMaintenance" onclick="switchTab('maintenance')">保養通知</div>
        <div class="tab-btn" id="tabBtnEvents" onclick="switchTab('events')">約騎名單</div>
    </div>

    <div id="tab-add" class="panel">
        <h2 id="formTitle">建立新車友檔案</h2>
        <div class="form-grid">
            <div class="form-group">
                <label>姓名 / 暱稱 *</label>
                <input type="text" id="cName" placeholder="例如：張小明">
            </div>
            <div class="form-group">
                <label>電話 *</label>
                <input type="tel" id="cPhone" placeholder="0912-345-678">
            </div>
            <div class="form-group">
                <label>LINE 顯示名稱</label>
                <input type="text" id="cLine" placeholder="方便對照群組名稱">
            </div>
            <div class="form-group">
                <label>買車日期</label>
                <input type="date" id="cPurchaseDate">
            </div>
            <div class="form-group full-width">
                <label>騎乘車款</label>
                <input type="text" id="cBikeModel" placeholder="例如：Giant TCR Advanced Pro / CADEX 50">
            </div>
            
            <div class="form-group full-width">
                <label>
                    客戶關聯銷售 
                    <button type="button" class="btn-date" onclick="insertToday('cRelatedSales')">➕ 加入今日日期</button>
                </label>
                <textarea id="cRelatedSales" rows="3" placeholder="紀錄客人購買的其他配件..."></textarea>
            </div>
            
            <div class="form-group full-width" style="margin-top: 10px;">
                <h3 style="font-size: 1rem; color: var(--text-muted); border-bottom: 1px solid var(--border); padding-bottom: 5px; margin-bottom: 10px;">🔧 維修保養紀錄</h3>
            </div>
            <div class="form-group full-width">
                <label>上次大保養日期</label>
                <input type="date" id="cMainDate">
            </div>
            <div class="form-group full-width">
                <label>
                    更換零件紀錄
                    <button type="button" class="btn-date" onclick="insertToday('cPartsReplaced')">➕ 加入今日日期</button>
                </label>
                <textarea id="cPartsReplaced" rows="3" placeholder="紀錄每次更換的耗材..."></textarea>
            </div>

            <div class="form-group full-width" style="margin-top: 10px;">
                <h3 style="font-size: 1rem; color: var(--text-muted); border-bottom: 1px solid var(--border); padding-bottom: 5px; margin-bottom: 10px;">🎯 活動與行銷紀錄</h3>
            </div>
            <div class="form-group full-width">
                <label>騎乘強度</label>
                <select id="cRidingIntensity">
                    <option value="">請選擇...</option>
                    <option value="高">高</option>
                    <option value="中">中</option>
                    <option value="低">低</option>
                </select>
            </div>
            <div class="form-group full-width">
                <label>
                    邀約活動紀錄
                    <button type="button" class="btn-date" onclick="insertToday('cEventRecords')">➕ 加入今日日期</button>
                </label>
                <textarea id="cEventRecords" rows="3" placeholder="紀錄如：邀約約騎、車友回覆狀態..."></textarea>
            </div>

            <div class="form-group full-width" style="margin-top: 10px;">
                <h3 style="font-size: 1rem; color: var(--text-muted); border-bottom: 1px solid var(--border); padding-bottom: 5px; margin-bottom: 10px;">⚙️ Fitting 數據紀錄</h3>
            </div>
            <div class="form-group">
                <label>座高 Saddle Height (cm)</label>
                <input type="number" id="fSaddle" step="0.1" placeholder="例如：72.5">
            </div>
            <div class="form-group">
                <label>Reach (mm)</label>
                <input type="number" id="fReach" placeholder="例如：385">
            </div>
            <div class="form-group">
                <label>Stack (mm)</label>
                <input type="number" id="fStack" placeholder="例如：545">
            </div>

            <div class="form-group full-width" style="margin-top: 10px;">
                <h3 style="font-size: 1rem; color: var(--text-muted); border-bottom: 1px solid var(--border); padding-bottom: 5px; margin-bottom: 10px;">📝 其他資訊</h3>
            </div>
            <div class="form-group full-width">
                <label>
                    特別備註
                    <button type="button" class="btn-date" onclick="insertToday('cNotes')">➕ 加入今日日期</button>
                </label>
                <textarea id="cNotes" rows="3" placeholder="紀錄客人的特殊需求或報價追蹤..."></textarea>
            </div>
        </div>
        <button id="saveBtn" class="action-btn" onclick="saveCustomer()">儲存客戶資料</button>
    </div>

    <div id="tab-list" class="panel active">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
            <h2 style="margin: 0; border: none;">客戶名單</h2>
            <div style="display: flex; gap: 8px;">
                <input type="file" id="importCsvFile" accept=".csv" style="display: none;" onchange="handleImportCSV(this)">
                <button class="btn-small btn-edit" onclick="document.getElementById('importCsvFile').click()">匯入 CSV</button>
                <button class="btn-small" style="background: var(--text-muted); color: #1a1a1d;" onclick="exportToExcel()">匯出 Excel</button>
            </div>
        </div>
        <div id="customerList"></div>
    </div>

    <div id="tab-maintenance" class="panel">
        <h2>保養通知名單</h2>
        <div class="event-invite-box">
            <label style="display: block; text-align: left; color: var(--text-muted); margin-bottom: 5px;">選擇基準日</label>
            <input type="date" id="maintCutoffDate" style="margin-bottom: 10px; font-size: 1.1rem; width: 100%;">
            <button class="btn-small btn-update" style="padding: 10px 20px; font-size: 1rem;" onclick="generateMaintList()">撈出保養名單</button>
        </div>
        <div id="maintResult" style="background: #111; padding: 15px; border-radius: 8px; min-height: 100px; white-space: pre-wrap; font-family: monospace; color: #4ade80;">請點擊上方按鈕產生名單...</div>
    </div>

    <div id="tab-events" class="panel">
        <h2>發起約騎活動</h2>
        <div class="event-invite-box">
            <input type="text" id="eventName" placeholder="例如：嘉義半天岩輕鬆騎..." style="margin-bottom: 10px; font-size: 1.1rem; text-align: center;">
            <button class="btn-small btn-update" style="padding: 10px 20px; font-size: 1rem;" onclick="generateInviteList()">產生邀請名單</button>
        </div>
        <div id="inviteResult" style="background: #111; padding: 15px; border-radius: 8px; min-height: 100px; white-space: pre-wrap; font-family: monospace; color: var(--accent);">請輸入活動名稱並點擊產生...</div>
    </div>

    <div style="text-align: center; margin-top: 50px; padding-top: 20px; border-top: 1px dashed #333;">
        <p style="font-size: 0.8rem; color: var(--text-muted); margin-bottom: 8px;">如果網頁按鈕依然卡死，可能是瀏覽器留有舊版的損壞快取資料：</p>
        <button onclick="clearSystemCache()" style="background: none; border: 1px solid var(--alert); color: var(--alert); padding: 4px 10px; font-size: 0.8rem; border-radius: 4px; cursor: pointer;">⚠️ 點我清除本機毀損快取並重設</button>
    </div>
</div>

<script>
    // 盾牌防禦機制：確保 JSON 解析失敗時網頁絕對不崩潰
    let customers = [];
    try {
        const localData = localStorage.getItem('veloCrmData');
        if (localData) {
            customers = JSON.parse(localData);
            if (!Array.isArray(customers)) customers = [];
        }
    } catch (e) {
        console.error("讀取本地舊資料失敗，已自動重設防崩潰", e);
        customers = [];
    }

    let editingCustomerId = null; 

    window.onload = function() {
        const halfYearAgo = new Date();
        halfYearAgo.setDate(halfYearAgo.getDate() - 180);
        const cutoffEl = document.getElementById('maintCutoffDate');
        if (cutoffEl) cutoffEl.value = halfYearAgo.toISOString().split('T')[0];
        
        renderCustomers();
    };

    function clearSystemCache() {
        if (confirm('確定要清空本機的所有測試資料以修復卡死問題嗎？（重要資料請先確認有備份）')) {
            localStorage.removeItem('veloCrmData');
            alert('快取已清除！網頁即將自動重新整理。');
            window.location.reload();
        }
    }

    function insertToday(elementId) {
        const el = document.getElementById(elementId);
        if (!el) return;
        const today = new Date().toISOString().split('T')[0];
        const prefix = el.value.trim() === '' ? '' : '\n';
        el.value += `${prefix}[${today}] `;
        el.focus();
    }

    function resetForm() {
        document.querySelectorAll('#tab-add input[type="text"], #tab-add input[type="tel"], #tab-add input[type="number"], #tab-add input[type="date"], #tab-add textarea').forEach(input => input.value = '');
        const intensityEl = document.getElementById('cRidingIntensity');
        if (intensityEl) intensityEl.value = '';
        
        document.getElementById('formTitle').innerText = '建立新車友檔案';
        document.getElementById('saveBtn').innerText = '儲存客戶資料';
        editingCustomerId = null;
    }

    function switchTab(tabId, isEdit = false) {
        if (tabId === 'add' && !isEdit) {
            resetForm();
        }

        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(panel => panel.classList.remove('active'));
        
        const targetTabBtn = document.getElementById(`tabBtn${tabId.charAt(0).toUpperCase() + tabId.slice(1)}`);
        const targetPanel = document.getElementById(`tab-${tabId}`);
        
        if (targetTabBtn) targetTabBtn.classList.add('active');
        if (targetPanel) targetPanel.classList.add('active');

        if(tabId === 'list') renderCustomers();
    }

    function editCustomer(id) {
        const c = customers.find(cust => cust.id === id);
        if(!c) return;

        document.getElementById('cName').value = c.name || '';
        document.getElementById('cPhone').value = c.phone || '';
        document.getElementById('cLine').value = (c.line === '未提供' || !c.line) ? '' : c.line;
        document.getElementById('cPurchaseDate').value = (c.purchaseDate === '未填寫' || !c.purchaseDate) ? '' : c.purchaseDate;
        document.getElementById('cBikeModel').value = (c.bikeModel || c.bike === '未填寫' || !(c.bikeModel || c.bike)) ? '' : (c.bikeModel || c.bike);
        document.getElementById('cRelatedSales').value = (c.relatedSales === '無' || !c.relatedSales) ? '' : c.relatedSales;
        document.getElementById('cMainDate').value = (c.lastMainDate === '未填寫' || !c.lastMainDate) ? '' : c.lastMainDate;
        document.getElementById('cPartsReplaced').value = (c.partsReplaced === '無' || !c.partsReplaced) ? '' : c.partsReplaced;
        document.getElementById('cRidingIntensity').value = c.intensity || c.willing || '';
        document.getElementById('cEventRecords').value = (c.eventRecords === '無' || !c.eventRecords) ? '' : c.eventRecords;
        document.getElementById('cNotes').value = (c.notes === '無' || !c.notes) ? '' : c.notes;
        document.getElementById('fSaddle').value = (c.fitting && c.fitting.saddle !== 'N/A') ? c.fitting.saddle : '';
        document.getElementById('fReach').value = (c.fitting && c.fitting.reach !== 'N/A') ? c.fitting.reach : '';
        document.getElementById('fStack').value = (c.fitting && c.fitting.stack !== 'N/A') ? c.fitting.stack : '';

        editingCustomerId = id;
        document.getElementById('formTitle').innerText = '✏️ 修改車友檔案';
        document.getElementById('saveBtn').innerText = '更新客戶資料';

        switchTab('add', true); 
    }

    function saveCustomer() {
        const name = document.getElementById('cName').value.trim();
        const phone = document.getElementById('cPhone').value.trim();
        const mainDate = document.getElementById('cMainDate').value;

        if (!name || !phone) {
            alert('姓名與電話為必填欄位！');
            return;
        }

        const customerData = {
            name: name,
            phone: phone,
            line: document.getElementById('cLine').value.trim() || '未提供',
            purchaseDate: document.getElementById('cPurchaseDate').value || '未填寫',
            bikeModel: document.getElementById('cBikeModel').value.trim() || '未填寫',
            relatedSales: document.getElementById('cRelatedSales').value.trim() || '無',
            lastMainDate: mainDate || '未填寫', 
            partsReplaced: document.getElementById('cPartsReplaced').value.trim() || '無',
            intensity: document.getElementById('cRidingIntensity').value || '未選擇',
            eventRecords: document.getElementById('cEventRecords').value.trim() || '無', 
            notes: document.getElementById('cNotes').value.trim() || '無',
            fitting: {
                saddle: document.getElementById('fSaddle').value || 'N/A',
                reach: document.getElementById('fReach').value || 'N/A',
                stack: document.getElementById('fStack').value || 'N/A'
            }
        };

        if (editingCustomerId) {
            const index = customers.findIndex(c => c.id === editingCustomerId);
            if(index !== -1) {
                customerData.id = editingCustomerId; 
                customers[index] = customerData;
            }
            alert('客戶資料更新成功！');
        } else {
            customerData.id = Date.now();
            customers.push(customerData);
            alert('客戶建檔成功！');
        }

        localStorage.setItem('veloCrmData', JSON.stringify(customers));
        resetForm();
        switchTab('list');
    }

    function deleteCustomer(id) {
        if(confirm('確定要刪除這位車友的資料嗎？')) {
            customers = customers.filter(c => c.id !== id);
            localStorage.setItem('veloCrmData', JSON.stringify(customers));
            renderCustomers();
        }
    }

    function updateMaintenance(id) {
        if(confirm('確認已完成保養？系統將把保養日期更新為今天。')) {
            const index = customers.findIndex(c => c.id === id);
            if(index !== -1) {
                customers[index].lastMainDate = new Date().toISOString().split('T')[0];
                localStorage.setItem('veloCrmData', JSON.stringify(customers));
                renderCustomers();
            }
        }
    }

    function formatMultilineText(text) {
        if (!text || text === '無') return '無';
        return text.replace(/\n/g, '<br>');
    }

    function renderCustomers() {
        const listDiv = document.getElementById('customerList');
        if (!listDiv) return;
        listDiv.innerHTML = '';

        if(!customers || customers.length === 0) {
            listDiv.innerHTML = '<p style="text-align:center; color:#9e9e9e;">目前尚無客戶資料，請至「新增建檔」建立。</p>';
            return;
        }

        // 100% 安全的中文字典排序（絕不因特殊核心崩潰）
        const sortedCustomers = [...customers].sort((a, b) => {
            const nameA = a.name || '';
            const nameB = b.name || '';
            return nameA.localeCompare(nameB, 'zh-TW');
        });

        const today = new Date();

        sortedCustomers.forEach(c => {
            if(!c) return;
            const pDate = c.purchaseDate || '未填寫';
            const bModel = c.bikeModel || c.bike || '未填寫'; 
            const cIntensity = c.intensity || c.willing || '未選擇';
            
            const cRelated = formatMultilineText(c.relatedSales);
            const cParts = formatMultilineText(c.partsReplaced);
            const cEvents = formatMultilineText(c.eventRecords || '無'); 
            const cNotes = formatMultilineText(c.notes);
            
            let badgeHtml = '';

            if (c.lastMainDate === '未填寫' || !c.lastMainDate) {
                badgeHtml = `<span class="badge none">無保養紀錄</span>`;
            } else {
                const mainDate = new Date(c.lastMainDate);
                const diffTime = Math.abs(today - mainDate);
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                
                if(diffDays > 180) {
                    badgeHtml = `<span class="badge alert">⚠️ 距上次保養已 ${diffDays} 天</span>`;
                } else {
                    badgeHtml = `<span class="badge ok">✅ 狀況良好 (${diffDays} 天)</span>`;
                }
            }

            listDiv.innerHTML += `
                <div class="customer-card">
                    <div class="card-header">
                        <div class="card-name">${c.name || '無名氏'} <span style="font-size:0.9rem; font-weight:normal; color:#9e9e9e;">(${c.line || '無LINE'})</span></div>
                        ${badgeHtml}
                    </div>
                    
                    <div class="info-grid">
                        <div class="info-item"><span>聯絡電話</span><strong>${c.phone || '無'}</strong></div>
                        <div class="info-item"><span>買車日期</span><strong>${pDate}</strong></div>
                        <div class="info-item full-width" style="grid-column: 1 / -1;"><span>騎乘車款</span><strong>${bModel}</strong></div>
                        
                        <div class="info-item full-width" style="grid-column: 1 / -1; background: rgba(255,255,255,0.02); padding: 8px; border-radius: 6px;">
                            <span>📦 關聯銷售紀錄</span><strong>${cRelated}</strong>
                        </div>
                        
                        <div class="info-item full-width" style="grid-column: 1 / -1; margin-top: 15px; border-top: 1px dashed #424242; padding-top: 12px;">
                            <span>上次大保養</span><strong>${c.lastMainDate}</strong>
                        </div>
                        <div class="info-item full-width" style="grid-column: 1 / -1; background: rgba(67, 160, 71, 0.05); border-left: 3px solid var(--success); padding: 10px; border-radius: 0 6px 6px 0; margin-top: 0;">
                            <span style="color:var(--success); font-weight:bold; margin-bottom:4px;">🔧 零件更換歷史日誌</span><strong>${cParts}</strong>
                        </div>
                        
                        <div class="info-item full-width" style="grid-column: 1 / -1; margin-top: 20px; border-top: 1px dashed #424242; padding-top: 12px;">
                            <span>騎乘強度輪廓</span><strong>${cIntensity}</strong>
                        </div>
                        <div class="info-item full-width" style="grid-column: 1 / -1; background: rgba(212, 175, 55, 0.05); border-left: 3px solid var(--accent); padding: 10px; border-radius: 0 6px 6px 0; margin-top: 0;">
                            <span style="color:var(--accent); font-weight:bold; margin-bottom:4px;">🚴‍♂️ 邀約活動追蹤紀錄</span><strong>${cEvents}</strong>
                        </div>
                    </div>

                    <div class="fitting-box">
                        <div style="margin-bottom: 8px; border-bottom: 1px dotted var(--border); padding-bottom: 8px;">
                            <span style="color: var(--text-muted); font-size: 0.85rem; display: block; margin-bottom: 4px;">📝 特別備註</span>
                            <span style="color: var(--text-main); line-height: 1.5; display: block;">${cNotes}</span>
                        </div>
                        <strong>📏 Fitting 數據：</strong> 
                        座高 ${c.fitting && c.fitting.saddle !== 'N/A' ? c.fitting.saddle : 'N/A'}cm | Reach ${c.fitting && c.fitting.reach !== 'N/A' ? c.fitting.reach : 'N/A'}mm | Stack ${c.fitting && c.fitting.stack !== 'N/A' ? c.fitting.stack : 'N/A'}mm
                    </div>

                    <div class="card-actions">
                        <button class="btn-small btn-update" onclick="updateMaintenance(${c.id})">更新為今日保養</button>
                        <button class="btn-small btn-edit" onclick="editCustomer(${c.id})">修改資料</button>
                        <button class="btn-small btn-delete" onclick="deleteCustomer(${c.id})">刪除</button>
                    </div>
                </div>
            `;
        });
    }

    function generateMaintList() {
        const cutoffDate = document.getElementById('maintCutoffDate').value;
        const resultDiv = document.getElementById('maintResult');
        if (!resultDiv) return;
        if (!cutoffDate) { alert('請先選擇基準日期！'); return; }

        const targetRiders = customers.filter(c => {
            if (c.lastMainDate === '未填寫' || !c.lastMainDate) return false;
            return new Date(c.lastMainDate) <= new Date(cutoffDate);
        });

        targetRiders.sort((a, b) => new Date(a.lastMainDate) - new Date(b.lastMainDate));
        if(targetRiders.length === 0) { resultDiv.innerHTML = '在此日期之前沒有需要提醒保養的車友。'; return; }

        let text = `🔧 【定期保養提醒名單】\n基準日期：${cutoffDate} 以前\n--------------------------\n`;
        targetRiders.forEach(r => {
            const bModel = r.bikeModel || r.bike || '未填寫';
            text += `[ ] ${r.name || '無名氏'} (LINE: ${r.line || '無'})\n    上次保養: ${r.lastMainDate} | 車款: ${bModel}\n\n`;
        });
        text += `--------------------------\n建議複製以上車友，至 LINE 發送保養提醒。`;
        resultDiv.innerHTML = text;
    }

    function generateInviteList() {
        const eventName = document.getElementById('eventName').value.trim() || '週末約騎活動';
        const resultDiv = document.getElementById('inviteResult');
        if (!resultDiv) return;
        
        const targetRiders = customers.filter(c => (c.intensity || c.willing) === '高' || (c.intensity || c.willing) === '中');
        if(targetRiders.length === 0) { resultDiv.innerHTML = '目前沒有符合「強度：高/中」的車友。'; return; }

        let text = `🚴‍♂️ 【${eventName}】邀請名單\n--------------------------\n`;
        targetRiders.forEach(r => {
            const bModel = r.bikeModel || r.bike || '未填寫';
            text += `[ ] ${r.name || '無名氏'} (LINE: ${r.line || '無'}) - 車款: ${bModel}\n`;
        });
        text += `--------------------------\n名單產生完畢！`;
        resultDiv.innerHTML = text;
    }

    function handleImportCSV(inputElement) {
        const file = inputElement.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            processCSVData(e.target.result);
            inputElement.value = ''; 
        };
        reader.readAsText(file, 'utf-8');
    }

    function processCSVData(csvText) {
        if (csvText.charCodeAt(0) === 0xFEFF) csvText = csvText.substring(1);
        const data = CSVToArray(csvText, ",");
        if (data.length < 2) { alert('檔案無有效資料！'); return; }

        let importCount = 0, updateCount = 0;

        for (let i = 1; i < data.length; i++) {
            const row = data[i];
            if (row.length < 11 || !row[0]) continue; 

            const name = (row[0] === '無' || row[0] === '無名氏') ? '' : row[0].trim();
            const phone = row[1] === '無' ? '' : row[1].trim();
            if (!name) continue; 

            const customerData = {
                id: Date.now() + i,
                name: name,
                phone: phone,
                line: row[2] || '未提供',
                purchaseDate: row[3] || '未填寫',
                bikeModel: row[4] || '未填寫',
                relatedSales: row[5] || '無',
                lastMainDate: row[6] || '未填寫',
                partsReplaced: row[7] || '無',
                intensity: row[8] || '未選擇',
                eventRecords: row[9] || '無',
                notes: row[10] || '無',
                fitting: {
                    saddle: row[11] || 'N/A',
                    reach: row[12] || 'N/A',
                    stack: row[13] || 'N/A'
                }
            };

            const existingIndex = customers.findIndex(c => c.name === name && c.phone === phone);
            if (existingIndex !== -1) {
                customerData.id = customers[existingIndex].id;
                customers[existingIndex] = customerData;
                updateCount++;
            } else {
                customers.push(customerData);
                importCount++;
            }
        }

        localStorage.setItem('veloCrmData', JSON.stringify(customers));
        renderCustomers();
        alert(`匯入完成！\n新增：${importCount} 位 | 更新：${updateCount} 位`);
    }

    // 安全防無窮迴圈的 CSV 陣列解析器
    function CSVToArray(strData, strDelimiter){
        strDelimiter = (strDelimiter || ",");
        const objPattern = new RegExp(
            ("(\\" + strDelimiter + "|\\r?\\n|\\r|^)" +
            "(?:\"([^\"]*(?:\"\"[^\"]*)*)\"|" +
            "([^\"\\" + strDelimiter + "\\r\\n]*))"), "gi"
        );
        const arrData = [[]];
        let arrMatches = null;
        while (arrMatches = objPattern.exec( strData )){
            const strMatchedDelimiter = arrMatches[ 1 ];
            if (strMatchedDelimiter.length && strMatchedDelimiter !== strDelimiter){
                arrData.push( [] );
            }
            let strMatchedValue = arrMatches[ 2 ] ? arrMatches[ 2 ].replace(new RegExp( "\"\"", "g" ), "\"") : arrMatches[ 3 ];
            arrData[ arrData.length - 1 ].push( strMatchedValue );
            
            // 安全防線：如果匹配長度為0，手動推進索引，防止特定瀏覽器無窮迴圈卡死
            if (objPattern.lastIndex === arrMatches.index) {
                objPattern.lastIndex++;
            }
        }
        return arrData;
    }

    function exportToExcel() {
        if(!customers || customers.length === 0) { alert('沒有資料可以匯出喔！'); return; }
        let csvContent = "\ufeff姓名,電話,LINE名稱,買車日期,騎乘車款,客戶關聯銷售,上次保養日期,更換零件紀錄,騎乘強度,邀約活動紀錄,特別備註,座高(cm),Reach(mm),Stack(mm)\n";
        const csvSafe = (t) => { if (!t || t === '無') return '"無"'; return `"${t.replace(/"/g, '""')}"`; };

        customers.forEach(c => {
            const fit = c.fitting || {};
            csvContent += `${csvSafe(c.name)},${csvSafe(c.phone)},${csvSafe(c.line)},${csvSafe(c.purchaseDate)},${csvSafe(c.bikeModel)},${csvSafe(c.relatedSales)},${csvSafe(c.lastMainDate)},${csvSafe(c.partsReplaced)},${csvSafe(c.intensity)},${csvSafe(c.eventRecords)},${csvSafe(c.notes)},${csvSafe(fit.saddle)},${csvSafe(fit.reach)},${csvSafe(fit.stack)}\n`;
        });

        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `嘉義店_客戶名單_${new Date().toISOString().split('T')[0]}.csv`;
        link.click();
    }
</script>
