<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>專業交易復盤終端機 - 嘉義終端</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #0d1117;
            --panel-bg: #161b22;
            --text-main: #c9d1d9;
            --text-muted: #8b949e;
            --accent: #58a6ff;
            --win: #3fb950;
            --loss: #f85149;
            --border: #30363d;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); padding: 20px; line-height: 1.5; font-size: 14px; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { color: var(--text-main); margin-bottom: 20px; font-weight: 600; letter-spacing: 1px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        
        .grid-layout { display: grid; grid-template-columns: 450px 1fr; gap: 20px; }
        @media (max-width: 1024px) { .grid-layout { grid-template-columns: 1fr; } }
        
        .panel { background: var(--panel-bg); border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin-bottom: 20px; }
        .panel-title { font-size: 1.1rem; color: var(--accent); margin-bottom: 15px; font-weight: 600; border-bottom: 1px dashed var(--border); padding-bottom: 6px; }
        
        /* 儀表板數據 */
        .dashboard-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; text-align: center; margin-bottom: 15px; }
        .stat-box { background: rgba(255,255,255,0.02); padding: 10px; border-radius: 6px; border: 1px solid var(--border); }
        .stat-box span { display: block; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 4px; }
        .stat-box strong { font-size: 1.2rem; }
        .text-win { color: var(--win); }
        .text-loss { color: var(--loss); }

        /* 表單 */
        .form-section-title { font-size: 0.9rem; color: var(--accent); margin: 15px 0 8px 0; font-weight: bold; }
        .form-group { margin-bottom: 12px; }
        label { display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 4px; }
        input, select, textarea { width: 100%; padding: 8px 10px; background: var(--bg-color); border: 1px solid var(--border); color: var(--text-main); border-radius: 4px; outline: none; }
        input:focus, select:focus, textarea:focus { border-color: var(--accent); }
        textarea { resize: vertical; min-height: 50px; }
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }
        
        .flex-row { display: flex; gap: 10px; }
        .flex-row .form-group { flex: 1; }

        .btn-goodinfo { background: #238636; color: white; border: none; padding: 0 12px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; font-weight: 600; white-space: nowrap; }
        .btn-goodinfo:hover { background: #2ea043; }

        .btn-submit { width: 100%; padding: 12px; background: var(--accent); color: #000; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 1rem; }
        .btn-submit:hover { opacity: 0.9; }

        /* 圖片上傳區 */
        .image-preview-box { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 4px; }
        .img-wrap { background: #0d1117; border: 1px solid var(--border); border-radius: 4px; padding: 4px; text-align: center; }
        .img-wrap span { display: block; font-size: 0.75rem; color: var(--text-muted); margin-bottom: 4px; }
        .img-wrap img { max-width: 100%; max-height: 100px; object-fit: contain; border-radius: 2px; cursor: pointer; }

        /* 交易明細列表卡片化 (天主體) */
        .trade-card { background: #1f242c; border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin-bottom: 16px; }
        .trade-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
        .macro-data-box { background: rgba(0,0,0,0.3); padding: 10px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.02); margin-bottom: 12px; }
        
        /* 單筆交易子項目 */
        .trade-item-box { background: rgba(255,255,255,0.01); border: 1px solid var(--border); padding: 12px; border-radius: 6px; margin-bottom: 8px; }
        .trade-item-box:last-child { margin-bottom: 0; }
        
        .chart-container { height: 250px; width: 100%; margin-bottom: 10px; }
        .btn-del { background: transparent; color: var(--loss); border: 1px solid var(--loss); padding: 2px 8px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; transition: 0.2s; }
        .btn-del:hover { background: rgba(248, 81, 73, 0.1); }
        .btn-export { background: transparent; color: var(--text-main); border: 1px solid var(--border); padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 0.85rem; transition: 0.2s; }
        .btn-export:hover { background: rgba(255,255,255,0.05); }
        .btn-export-img { background: rgba(88, 166, 255, 0.1); color: var(--accent); border: 1px solid var(--accent); padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 0.85rem; font-weight: bold; transition: 0.2s; }
        .btn-export-img:hover { background: var(--accent); color: #000; }
    </style>
</head>
<body>

<div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px;">
        <h1 style="margin: 0; border: none; padding: 0;">專業交易復盤終端機</h1>
        <div style="display: flex; gap: 10px; flex-wrap: wrap;">
            <button class="btn-export" onclick="exportToExcel()">📊 匯出量化 Excel</button>
            <button class="btn-export-img" onclick="exportToHtmlReport()">📥 匯出完整圖文備份</button>
            <button class="btn-export" style="border-color: var(--loss); color: var(--loss);" onclick="clearCache()">清空所有紀錄</button>
        </div>
    </div>

    <div class="grid-layout">
        <div>
            <div class="panel">
                <div class="panel-title">日誌數據輸入</div>
                
                <div class="flex-row">
                    <div class="form-group">
                        <label>結算日期</label>
                        <input type="date" id="tDate">
                    </div>
                    <div class="form-group">
                        <label>主要操作標的 *</label>
                        <div class="input-group">
                            <input type="text" id="tTicker" placeholder="代號/名稱">
                            <button type="button" class="btn-goodinfo" onclick="goodinfoShortcut()">查籌碼</button>
                        </div>
                    </div>
                </div>

                <div class="flex-row">
                    <div class="form-group">
                        <label>策略類型</label>
                        <select id="tStrategy">
                            <option value="漲停成本">漲停成本</option>
                            <option value="鎖漲停">鎖漲停</option>
                            <option value="一般當沖">一般當沖</option>
                            <option value="波段單">波段單</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>單筆已實現損益 *</label>
                        <input type="number" id="tPnL" placeholder="獲利填正，虧損填負">
                    </div>
                </div>

                <div class="form-section-title">📊 每日宏觀與期權籌碼追蹤 (當天填一次即可)</div>
                
                <div class="flex-row">
                    <div class="form-group">
                        <label>外資期貨空單 (口數)</label>
                        <input type="number" id="mForeignOk" placeholder="口數">
                    </div>
                    <div class="form-group">
                        <label>外資現貨買賣超 (億)</label>
                        <input type="number" id="mForeignStock" placeholder="金額 (億)" step="0.1">
                    </div>
                    <div class="form-group">
                        <label>投信買賣超 (億)</label>
                        <input type="number" id="mSitcaStock" placeholder="金額 (億)" step="0.1">
                    </div>
                </div>

                <div class="flex-row">
                    <div class="form-group">
                        <label>大盤漲跌點數</label>
                        <input type="text" id="mTsexPoint" placeholder="如: -150">
                    </div>
                    <div class="form-group">
                        <label>大盤漲跌幅 %</label>
                        <input type="text" id="mTsexPercent" placeholder="如: -0.65%">
                    </div>
                </div>

                <div class="flex-row">
                    <div class="form-group">
                        <label>OTC 漲跌點數</label>
                        <input type="text" id="mOtcPoint" placeholder="如: +2.1">
                    </div>
                    <div class="form-group">
                        <label>OTC 漲跌幅 %</label>
                        <input type="text" id="mOtcPercent" placeholder="如: +0.8%">
                    </div>
                </div>

                <div class="form-section-title">📸 復盤圖表與損益照片上傳</div>
                <div class="flex-row">
                    <div class="form-group">
                        <label>點位檢討截圖</label>
                        <input type="file" id="imgReview" accept="image/*" onchange="previewImage(this, 'preReview')">
                    </div>
                    <div class="form-group">
                        <label>今日對帳單照片</label>
                        <input type="file" id="imgPnL" accept="image/*" onchange="previewImage(this, 'prePnL')">
                    </div>
                </div>
                <div class="image-preview-box">
                    <div class="img-wrap"><span>點位檢討預覽</span><img id="preReview" src="" style="display:none;"></div>
                    <div class="img-wrap"><span>對帳單預覽</span><img id="prePnL" src="" style="display:none;"></div>
                </div>

                <div class="form-group" style="margin-top: 15px;">
                    <label>本筆交易微結構復盤筆記</label>
                    <textarea id="tNotes" rows="3" placeholder="紀錄委託簿異常、滑價狀況、是否確實遵守策略紀律..."></textarea>
                </div>

                <button class="btn-submit" onclick="saveTradeRecord()">儲存本筆交易紀錄</button>
            </div>
        </div>

        <div>
            <div class="panel">
                <div class="panel-title">累積資金曲線終端</div>
                <div class="dashboard-grid">
                    <div class="stat-box"><span>總交易筆數</span><strong id="statCount">0</strong></div>
                    <div class="stat-box"><span>策略總勝率</span><strong id="statWinRate">0%</strong></div>
                    <div class="stat-box"><span>累積淨損益</span><strong id="statTotalPnL">$0</strong></div>
                </div>
                <div class="chart-container">
                    <canvas id="equityCurveChart"></canvas>
                </div>
            </div>

            <div class="panel">
                <div class="panel-title">歷史交易日誌明細 (籌碼獨立置頂)</div>
                <div id="tradeLogContainer"></div>
            </div>
        </div>
    </div>
</div>

<script>
    let tradeJournal = {}; 
    let equityChart = null;
    let reviewImgBase64 = "";
    let pnlImgBase64 = "";

    window.onload = function() {
        document.getElementById('tDate').value = new Date().toISOString().split('T')[0];
        loadJournalData();
    };

    function loadJournalData() {
        const localDataV3 = localStorage.getItem('veloQuantJournal_v3');
        if (localDataV3) {
            tradeJournal = JSON.parse(localDataV3);
        } else {
            tradeJournal = {};
        }
        refreshDashboard();
    }

    function goodinfoShortcut() {
        const ticker = document.getElementById('tTicker').value.trim();
        const codeMatch = ticker.match(/\d{4,}/); 
        const code = codeMatch ? codeMatch[0] : ticker;
        if (!code) { alert('請輸入股票代號！'); return; }
        window.open(`https://goodinfo.tw/tw/StockDetail.asp?STOCK_ID=${code}`, '_blank');
    }

    // 圖片轉檔 (限制大小避免存檔過大)
    function previewImage(input, previewId) {
        const file = input.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            const img = new Image();
            img.onload = function() {
                // 壓縮機制：若圖片太大，壓縮至最大寬度 1200px 確保瀏覽器儲存不爆表
                const canvas = document.createElement('canvas');
                let width = img.width;
                let height = img.height;
                const MAX_WIDTH = 1200;
                
                if (width > MAX_WIDTH) {
                    height = Math.round((height * MAX_WIDTH) / width);
                    width = MAX_WIDTH;
                }
                
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                
                const compressedBase64 = canvas.toDataURL('image/jpeg', 0.8);
                
                const imgEl = document.getElementById(previewId);
                imgEl.src = compressedBase64;
                imgEl.style.display = 'block';
                
                if (previewId === 'preReview') reviewImgBase64 = compressedBase64;
                if (previewId === 'prePnL') pnlImgBase64 = compressedBase64;
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    function saveTradeRecord() {
        const date = document.getElementById('tDate').value;
        const ticker = document.getElementById('tTicker').value.trim() || "未知標的";
        const strategy = document.getElementById('tStrategy').value;
        const pnl = parseFloat(document.getElementById('tPnL').value);

        if (!date || isNaN(pnl)) {
            alert('交易日期與損益金額是必填的欄位！');
            return;
        }

        if (!tradeJournal[date]) {
            tradeJournal[date] = {
                date: date, fOk: "—", fStock: "—", sStock: "—",
                tPoint: "—", tPercent: "—", oPoint: "—", oPercent: "—",
                imgRev: "", imgPnl: "", trades: []
            };
        }

        const v = (id) => document.getElementById(id).value.trim();
        if (v('mForeignOk')) tradeJournal[date].fOk = v('mForeignOk');
        if (v('mForeignStock')) tradeJournal[date].fStock = v('mForeignStock');
        if (v('mSitcaStock')) tradeJournal[date].sStock = v('mSitcaStock');
        if (v('mTsexPoint')) tradeJournal[date].tPoint = v('mTsexPoint');
        if (v('mTsexPercent')) tradeJournal[date].tPercent = v('mTsexPercent');
        if (v('mOtcPoint')) tradeJournal[date].oPoint = v('mOtcPoint');
        if (v('mOtcPercent')) tradeJournal[date].oPercent = v('mOtcPercent');
        
        if (reviewImgBase64) tradeJournal[date].imgRev = reviewImgBase64;
        if (pnlImgBase64) tradeJournal[date].imgPnl = pnlImgBase64;

        const newTradeItem = {
            id: Date.now(),
            ticker: ticker,
            strategy: strategy,
            pnl: pnl,
            notes: document.getElementById('tNotes').value.trim() || '無'
        };

        tradeJournal[date].trades.push(newTradeItem);
        
        try {
            localStorage.setItem('veloQuantJournal_v3', JSON.stringify(tradeJournal));
        } catch (e) {
            alert('儲存失敗！可能是上傳的圖片累積過多導致瀏覽器容量已滿。請匯出「圖文備份」後清空紀錄再重新開始。');
            return;
        }

        document.getElementById('tTicker').value = '';
        document.getElementById('tPnL').value = '';
        document.getElementById('tNotes').value = '';
        document.getElementById('imgReview').value = '';
        document.getElementById('imgPnL').value = '';
        document.getElementById('preReview').style.display = 'none';
        document.getElementById('prePnL').style.display = 'none';
        reviewImgBase64 = "";
        pnlImgBase64 = "";

        refreshDashboard();
    }

    function deleteRecord(date, tradeId) {
        if (confirm('確定要永久刪除這筆交易明細嗎？')) {
            if (tradeJournal[date]) {
                tradeJournal[date].trades = tradeJournal[date].trades.filter(t => t.id !== tradeId);
                if (tradeJournal[date].trades.length === 0) {
                    delete tradeJournal[date];
                }
                localStorage.setItem('veloQuantJournal_v3', JSON.stringify(tradeJournal));
                refreshDashboard();
            }
        }
    }

    function clearCache() {
        if (confirm('確定要清空所有的交易紀錄嗎？（此動作無法復原，建議先匯出備份）')) {
            tradeJournal = {};
            localStorage.setItem('veloQuantJournal_v3', JSON.stringify(tradeJournal));
            refreshDashboard();
        }
    }

    function formatMultilineText(text) {
        if (!text || text === '無') return '無';
        return text.replace(/\n/g, '<br>');
    }

    function refreshDashboard() {
        const container = document.getElementById('tradeLogContainer');
        if (!container) return;
        container.innerHTML = '';

        let overallTotalPnL = 0;
        let overallWinCount = 0;
        let overallTradeCount = 0;
        
        let equityCurveData = [0];
        let chartLabels = ['起始'];

        const sortedDatesDesc = Object.keys(tradeJournal).sort((a, b) => new Date(b) - new Date(a));

        sortedDatesDesc.forEach(date => {
            const day = tradeJournal[date];
            if (!day || !day.trades || day.trades.length === 0) return;

            const revImgHtml = day.imgRev ? `<div class="img-wrap"><span>點位檢討圖</span><img src="${day.imgRev}" onclick="window.open(this.src)"></div>` : '';
            const pnlImgHtml = day.imgPnl ? `<div class="img-wrap"><span>對帳單圖</span><img src="${day.imgPnl}" onclick="window.open(this.src)"></div>` : '';
            const imgBlock = (day.imgRev || day.imgPnl) ? `<div class="image-preview-box">${revImgHtml}${pnlImgHtml}</div>` : '';

            let dayCardHtml = `
                <div class="trade-card">
                    <div class="trade-card-header">
                        <div><strong style="font-size:1.1rem; color:var(--accent);">📅 ${day.date} 盤後復盤日誌</strong></div>
                    </div>
                    
                    <div class="macro-data-box">
                        <div style="font-weight:bold; color:var(--text-main); font-size:0.85rem; margin-bottom:6px;">📊 每日宏觀與期權籌碼追蹤</div>
                        <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; font-size: 0.8rem; color: var(--text-muted);">
                            <div>外資期空：<span style="color:var(--text-main);">${day.fOk} 口</span></div>
                            <div>外資現貨：<span style="color:var(--text-main);">${day.fStock} 億</span></div>
                            <div>投信現貨：<span style="color:var(--text-main);">${day.sStock} 億</span></div>
                        </div>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 6px; font-size: 0.8rem; color: var(--text-muted); margin-top: 6px; border-top: 1px dashed rgba(255,255,255,0.05); padding-top: 6px;">
                            <div>大盤指數：<span style="color:var(--text-main);">${day.tPoint} 點 (${day.tPercent})</span></div>
                            <div>OTC 指數：<span style="color:var(--text-main);">${day.oPoint} 點 (${day.oPercent})</span></div>
                        </div>
                        ${imgBlock}
                    </div>
                    
                    <div style="display: flex; flex-direction: column; gap: 10px;">
            `;

            day.trades.forEach(t => {
                const itemPnLColor = t.pnl >= 0 ? 'var(--win)' : 'var(--loss)';
                const itemSign = t.pnl > 0 ? '+' : '';

                dayCardHtml += `
                    <div class="trade-item-box" style="border-left: 3px solid ${itemPnLColor};">
                        <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                            <div>
                                <span style="font-size: 1rem; font-weight: bold;">${t.ticker}</span>
                                <span style="background: rgba(255,255,255,0.05); padding: 2px 6px; border-radius: 4px; font-size: 0.75rem; color: var(--text-muted); margin-left: 8px;">${t.strategy}</span>
                            </div>
                            <div style="color:${itemPnLColor}; font-weight:bold; font-size:1.05rem;">${itemSign}${t.pnl.toLocaleString()}</div>
                        </div>
                        <div style="margin-top: 6px; color:var(--text-main); font-size:0.85rem;">
                            <span style="color:var(--text-muted); font-size:0.8rem;">復盤筆記：</span>${formatMultilineText(t.notes)}
                        </div>
                        <div style="text-align: right; margin-top: 4px;">
                            <button class="btn-del" onclick="deleteRecord('${day.date}', ${t.id})">刪除此筆</button>
                        </div>
                    </div>
                `;
            });

            dayCardHtml += `</div></div>`;
            container.innerHTML += dayCardHtml;
        });

        const sortedDatesAsc = Object.keys(tradeJournal).sort((a, b) => new Date(a) - new Date(b));
        sortedDatesAsc.forEach(date => {
            const day = tradeJournal[date];
            if(!day || !day.trades) return;
            day.trades.forEach(t => {
                overallTotalPnL += t.pnl;
                overallTradeCount++;
                if (t.pnl > 0) overallWinCount++;
                equityCurveData.push(overallTotalPnL);
                chartLabels.push(date.substring(5) + " " + t.ticker.split(' ')[0]);
            });
        });

        document.getElementById('statCount').innerText = overallTradeCount;
        document.getElementById('statWinRate').innerText = `${overallTradeCount > 0 ? ((overallWinCount / overallTradeCount) * 100).toFixed(1) : 0}%`;
        
        const totalPnlEl = document.getElementById('statTotalPnL');
        if (totalPnlEl) {
            totalPnlEl.innerText = `${overallTotalPnL >= 0 ? '+' : ''}${overallTotalPnL.toLocaleString()}`;
            totalPnlEl.style.color = overallTotalPnL >= 0 ? 'var(--win)' : 'var(--loss)';
        }

        drawEquityCurve(chartLabels, equityCurveData);
    }

    function drawEquityCurve(labels, data) {
        const ctx = document.getElementById('equityCurveChart').getContext('2d');
        if (equityChart) equityChart.destroy();
        const isProfitable = data[data.length - 1] >= 0;

        equityChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    data: data,
                    borderColor: isProfitable ? '#3fb950' : '#f85149',
                    backgroundColor: isProfitable ? 'rgba(63, 185, 80, 0.03)' : 'rgba(248, 81, 73, 0.03)',
                    borderWidth: 2,
                    pointRadius: 2,
                    fill: true,
                    stepped: true
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    x: { ticks: { color: '#8b949e', font: {size: 10} }, grid: { display: false } },
                    y: { ticks: { color: '#8b949e', font: {size: 10} }, grid: { color: '#30363d' } }
                }
            }
        });
    }

    // --- 機制 1：匯出乾淨的量化用 Excel (移除干擾字元) ---
    function exportToExcel() {
        if(Object.keys(tradeJournal).length === 0) { alert('無資料可匯出！'); return; }
        
        // 注意：這裡不輸出 Base64 亂碼，只輸出文字標記，避免 Excel 崩潰
        let csvContent = "\ufeff日期,主要標的,策略類型,已實現損益,外資期貨空單,外資現貨買賣超,投信買賣超,大盤點數,大盤增幅,OTC點數,OTC增幅,是否有附圖,復盤筆記\n";
        const csvSafe = (t) => { if (!t) return '""'; return `"${t.toString().replace(/"/g, '""').replace(/\n/g, ' | ')}"`; };
        
        const sortedDatesDesc = Object.keys(tradeJournal).sort((a, b) => new Date(b) - new Date(a));
        sortedDatesDesc.forEach(date => {
            const day = tradeJournal[date];
            const hasImg = (day.imgRev || day.imgPnl) ? "有附圖" : "無";
            
            day.trades.forEach(t => {
                csvContent += `${csvSafe(day.date)},${csvSafe(t.ticker)},${csvSafe(t.strategy)},${t.pnl},${csvSafe(day.fOk)},${csvSafe(day.fStock)},${csvSafe(day.sStock)},${csvSafe(day.tPoint)},${csvSafe(day.tPercent)},${csvSafe(day.oPoint)},${csvSafe(day.oPercent)},${csvSafe(hasImg)},${csvSafe(t.notes)}\n`;
            });
        });

        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `交易量化數據_${new Date().toISOString().split('T')[0]}.csv`;
        link.click();
    }

    // --- 機制 2：全新開發！匯出包含圖片的離線完整 HTML 報告 ---
    function exportToHtmlReport() {
        if(Object.keys(tradeJournal).length === 0) { alert('無資料可匯出！'); return; }

        let reportCards = '';
        const sortedDatesDesc = Object.keys(tradeJournal).sort((a, b) => new Date(b) - new Date(a));

        sortedDatesDesc.forEach(date => {
            const day = tradeJournal[date];
            
            const revImgHtml = day.imgRev ? `<div class="img-box"><strong>📍 點位檢討</strong><br><img src="${day.imgRev}"></div>` : '';
            const pnlImgHtml = day.imgPnl ? `<div class="img-box"><strong>💰 對帳單</strong><br><img src="${day.imgPnl}"></div>` : '';
            const imgContainer = (day.imgRev || day.imgPnl) ? `<div class="img-container">${revImgHtml}${pnlImgHtml}</div>` : '';

            let tradesHtml = '';
            day.trades.forEach(t => {
                const color = t.pnl >= 0 ? '#3fb950' : '#f85149';
                tradesHtml += `
                    <div class="trade-item" style="border-left-color: ${color}">
                        <div class="flex-bw">
                            <span><strong>${t.ticker}</strong> <span class="tag">${t.strategy}</span></span>
                            <strong style="color: ${color}">${t.pnl > 0 ? '+' : ''}${t.pnl.toLocaleString()}</strong>
                        </div>
                        <div class="notes">${t.notes.replace(/\n/g, '<br>')}</div>
                    </div>
                `;
            });

            reportCards += `
                <div class="card">
                    <div class="card-title">📅 ${day.date} 復盤報告</div>
                    <div class="macro-box">
                        <div><strong>外資期空：</strong>${day.fOk} 口</div>
                        <div><strong>外資現貨：</strong>${day.fStock} 億</div>
                        <div><strong>投信現貨：</strong>${day.sStock} 億</div>
                        <div><strong>大盤指數：</strong>${day.tPoint} (${day.tPercent})</div>
                        <div><strong>OTC指數：</strong>${day.oPoint} (${day.oPercent})</div>
                    </div>
                    ${imgContainer}
                    <div class="trades-container">${tradesHtml}</div>
                </div>
            `;
        });

        const htmlContent = `
<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>交易圖文復盤報告 - 離線備份</title>
    <style>
        body { background: #0d1117; color: #c9d1d9; font-family: sans-serif; padding: 20px; line-height: 1.6; }
        .container { max-width: 900px; margin: 0 auto; }
        h1 { text-align: center; color: #58a6ff; border-bottom: 1px solid #30363d; padding-bottom: 10px; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 20px; margin-bottom: 20px; }
        .card-title { font-size: 1.2rem; font-weight: bold; color: #58a6ff; margin-bottom: 15px; border-bottom: 1px dashed #30363d; padding-bottom: 10px; }
        .macro-box { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 6px; font-size: 0.9rem; margin-bottom: 15px; }
        .img-container { display: flex; gap: 15px; margin-bottom: 15px; overflow-x: auto; }
        .img-box { background: #000; border: 1px solid #30363d; padding: 5px; border-radius: 4px; text-align: center; flex: 1; }
        .img-box img { max-width: 100%; height: auto; border-radius: 2px; }
        .trade-item { background: rgba(255,255,255,0.02); border: 1px solid #30363d; border-left: 4px solid #58a6ff; padding: 12px; margin-bottom: 10px; border-radius: 4px; }
        .flex-bw { display: flex; justify-content: space-between; align-items: center; }
        .tag { background: #30363d; padding: 2px 6px; border-radius: 4px; font-size: 0.8rem; margin-left: 8px; }
        .notes { margin-top: 8px; color: #8b949e; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>交易圖文復盤報告 (產生時間：${new Date().toLocaleString()})</h1>
        ${reportCards}
    </div>
</body>
</html>`;

        const blob = new Blob([htmlContent], { type: 'text/html;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `交易圖文報告備份_${new Date().toISOString().split('T')[0]}.html`;
        link.click();
    }
</script>
</body>
</html>
